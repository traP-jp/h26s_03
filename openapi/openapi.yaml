openapi: 3.0.0
info:
  title: h26s_03 API
  version: 0.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/initialize:
    post:
      operationId: initialize
      summary: データを初期化する
      description: 既存データを削除し、開発用サンプルデータを再投入する
      responses:
        '204':
          description: 初期化が完了した
  /api/tasks:
    get:
      operationId: getTasks
      summary: タスク一覧を取得する
      description: 登録済みタスクの一覧を返す
      responses:
        '200':
          description: タスク一覧を返した
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksResponse'
    post:
      operationId: createTask
      summary: タスクを作成する
      description: 新しいタスクを登録する
      requestBody:
        required: true
        description: 作成するタスクの内容
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: タスクの作成が完了した
components:
  schemas:
    Task:
      type: object
      description: タスク
      required:
        - id
        - title
        - status
      properties:
        id:
          type: integer
          format: int64
          description: タスクID
        title:
          type: string
          description: タスク名
        status:
          type: string
          description: タスク状態
    TasksResponse:
      type: object
      description: タスク一覧レスポンス
      required:
        - data
      properties:
        data:
          type: array
          description: タスク一覧
          items:
            $ref: '#/components/schemas/Task'
    CreateTaskRequest:
      type: object
      description: タスク作成リクエスト
      required:
        - title
      properties:
        title:
          type: string
          description: タスク名
